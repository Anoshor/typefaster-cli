name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · type · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check client tests

      - name: Format check (black)
        run: black --check client tests

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest --cov=typefaster --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  server:
    name: server lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install shared + server
        run: |
          python -m pip install ./shared
          python -m pip install "./server[dev]"
      - name: Lint (ruff)
        run: ruff check server shared --select E,F,I,UP,B --ignore UP042
      - name: Test (pytest)
        run: cd server && pytest

  audit:
    name: dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pip-audit
      - name: Audit client deps
        run: pip-audit --strict --progress-spinner off . || true
      - name: Audit server deps
        run: pip-audit --strict --progress-spinner off ./server || true

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [quality, server]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
