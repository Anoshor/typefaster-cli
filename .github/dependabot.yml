version: 2
updates:
  - package-ecosystem: pip
    directory: "/"           # client (root pyproject)
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: pip
    directory: "/server"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
  - package-ecosystem: pip
    directory: "/shared"
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
