# Nginx reverse proxy for TYPEFASTER: TLS termination + WebSocket upgrade.
# Place certs at infra/nginx/certs/{fullchain.pem,privkey.pem}.

user  nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Map for WebSocket connection upgrade.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream typefaster_server {
        server server:8000;
    }

    # Redirect HTTP → HTTPS.
    server {
        listen 80;
        server_name _;
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # REST API.
        location / {
            proxy_pass http://typefaster_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoint (long-lived; disable buffering, raise timeouts).
        location /ws/ {
            proxy_pass http://typefaster_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }
}
