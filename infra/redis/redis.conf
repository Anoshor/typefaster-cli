# Minimal hardened Redis config for the single-VM TYPEFASTER deployment.

# Persistence: AOF for durability of users/leaderboards across restarts.
appendonly yes
appendfsync everysec

# RDB snapshots as a secondary safety net.
save 900 1
save 300 10
save 60 10000

# Keep memory bounded; evict volatile keys (sessions/race state) under pressure.
maxmemory 256mb
maxmemory-policy volatile-lru

# Listen on the internal Docker network so the server container can connect.
# Redis is NOT published to the host or internet (no `ports:` mapping in
# docker-compose.yml), so protected-mode is safely disabled here. Do not expose
# 6379 publicly without also setting `requirepass`.
bind 0.0.0.0
protected-mode no

# Reduce log noise.
loglevel notice
