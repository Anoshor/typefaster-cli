# Minimal hardened Redis config for the single-VM TYPEFASTER deployment.

# Persistence: AOF for durability of users/leaderboards across restarts.
appendonly yes
appendfsync everysec

# RDB snapshots as a secondary safety net.
save 900 1
save 300 10
save 60 10000

# Keep memory bounded; evict volatile keys (sessions/race state) under pressure.
maxmemory 256mb
maxmemory-policy volatile-lru

# Only listen on the container network; never expose Redis publicly.
bind 0.0.0.0
protected-mode yes

# Reduce log noise.
loglevel notice
